
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ficha de Producto</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 40px;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .fecha {
                font-size: 14px;
                color: #555;
            }
            .logo {
                height: 80px;
            }
            table {
                width: 50%;
                max-width: 800px;
                margin: 40px auto;   /* centra horizontalmente */
            }

            th, td {
                padding: 8px;
                border: 1px solid black;
                text-align: center;
            }

            thead {
                background-color: #b0b0b0;  /* gris oscuro suave */
                color: black;
            }

            tbody tr:nth-child(odd) {
            background-color: white ;  /* gris claro */
            }

            tbody tr:nth-child(even) {
            background-color: #d6d6d6;
            }
            ul {
                width: 50%;
                max-width: 800px;
                margin: 40px auto;   /* centra horizontalmente */
            }
            h2 {
                text-align: center;
                margin-top: 30px;
                margin-bottom: 20px;
            }
            @media (max-width: 768px) {
                table {
                    width: 90%;
                }
            }
        </style>
    </head>
    <body>

        <div class="header">
            <div class="fecha">
                Fecha de creación: 03-03-2026
            </div>
            <img src="cropped-LogoMakr-9GoHln-40x40.png" alt="Logo Empresa" class="logo">
        </div>

        <h2>Resumen del Producto</h2>
        <table>

    <thead>
    <tr>
        <th>Dato</th>
        <th>Valor</th>
    </tr>
    </thead>
    <tbody>
    <tr><td>NS</td><td>1.0</td></tr>
<tr><td>PN PCB</td><td>2.0</td></tr>
<tr><td>PN Assembly</td><td>3.0</td></tr>
<tr><td>Tarjeta</td><td>4.0</td></tr>
<tr><td>Protocolo</td><td>5.0</td></tr>
<tr><td>Reparacion</td><td>6.0</td></tr>
</tbody>
</table>

<li>Comentarios</li>

</ul>

    </body>
    </html>
