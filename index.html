<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumen de Tarjeta</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background-color: #f4f4f4;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
    background-color: #9B9B9B 
}
th {
    background-color: #0056b3;
    color: white;
}
</style>
</head>
<body>

<div class="card">
<h2>Ficha Técnica</h2>

<table>
<tr>
<th>Producto</th>
<th>Cantidad</th>
<th>Precio</th>
</tr>
<tr>
<td>Motor A</td>
<td>2</td>
<td>$150.000</td>
</tr>
<tr>
<td>Motor B</td>
<td>1</td>
<td>$120.000</td>
</tr>
</table>

</div>

</body>
</html>
